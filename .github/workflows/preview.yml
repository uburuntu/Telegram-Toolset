name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Install Surge
        run: npm install -g surge

      - name: Deploy to Surge
        run: surge ./dist pr-${{ github.event.pull_request.number }}-telegram-toolset.surge.sh --token ${{ secrets.SURGE_TOKEN }}

      - name: Comment PR
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        with:
          script: |
            const url = `https://pr-${process.env.PR_NUMBER}-telegram-toolset.surge.sh`;
            const sha = process.env.HEAD_SHA.substring(0, 7);
            const fullSha = process.env.HEAD_SHA;
            const title = process.env.PR_TITLE;
            const repoUrl = `https://github.com/${process.env.REPO}`;
            
            const body = [
              '### Preview Deployment',
              '',
              `**URL:** ${url}`,
              `**Commit:** [\`${sha}\`](${repoUrl}/commit/${fullSha})`,
              `**Title:** ${title}`,
              '',
              '_Built from the latest commit. Updates on each push._'
            ].join('\n');
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('Preview Deployment'));
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  teardown:
    name: Teardown Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    steps:
      - name: Install Surge
        run: npm install -g surge

      - name: Teardown
        run: surge teardown pr-${{ github.event.pull_request.number }}-telegram-toolset.surge.sh --token ${{ secrets.SURGE_TOKEN }}

